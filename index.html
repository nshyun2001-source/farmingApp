function useWeather(){
  const COORD_KEY='farmingCoords';
  const WX_KEY='farmingWeather';
  const WX_TTL=30*60*1000; // 30분

  const [wx,setWx]=useState(()=>{
    try{
      const c=JSON.parse(localStorage.getItem(WX_KEY)||'null');
      if(c&&Date.now()-c.ts<WX_TTL) return{...c.data,status:'ok'};
    }catch(e){}
    return{status:'idle',temp:null,min:null,max:null,hum:null,desc:'',icon:'',city:''};
  });

  useEffect(()=>{
    // 캐시된 날씨가 아직 유효하면 즉시 반환 (위치 요청 없음)
    try{
      const c=JSON.parse(localStorage.getItem(WX_KEY)||'null');
      if(c&&Date.now()-c.ts<WX_TTL){setWx({...c.data,status:'ok'});return;}
    }catch(e){}

    const fetchWx=async(lat,lon)=>{
      try{
        const[wxRes,geoRes]=await Promise.all([
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`),
          fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
        ]);
        const wxData=await wxRes.json();
        const geoData=await geoRes.json();
        const code=wxData.current.weather_code;
        const descs={0:['맑음','☀️'],1:['구름조금','🌤️'],2:['구름많음','⛅'],3:['흐림','☁️'],45:['안개','🌫️'],48:['안개','🌫️'],51:['이슬비','🌦️'],53:['이슬비','🌦️'],55:['이슬비','🌦️'],61:['비','🌧️'],63:['비','🌧️'],65:['강한 비','🌧️'],71:['눈','❄️'],73:['눈','❄️'],75:['폭설','❄️'],80:['소나기','🌧️'],81:['소나기','🌧️'],82:['소나기','🌧️'],95:['천둥','⛈️']};
        const[desc,icon]=descs[code]||['맑음','🌤️'];
        const addr=geoData.address;
        const city=addr.city||addr.town||addr.county||addr.village||addr.state||'';
        const data={temp:Math.round(wxData.current.temperature_2m),min:Math.round(wxData.daily.temperature_2m_min[0]),max:Math.round(wxData.daily.temperature_2m_max[0]),hum:wxData.current.relative_humidity_2m,desc,icon,city};
        localStorage.setItem(WX_KEY,JSON.stringify({ts:Date.now(),data}));
        setWx({status:'ok',...data});
      }catch(e){setWx(w=>({...w,status:'error',desc:'날씨 오류'}));}
    };

    // 이전에 저장된 좌표가 있으면 위치 권한 없이 바로 날씨 호출
    try{
      const saved=JSON.parse(localStorage.getItem(COORD_KEY)||'null');
      if(saved?.lat&&saved?.lon){
        setWx(w=>({...w,status:'loading'}));
        fetchWx(saved.lat,saved.lon);
        return;
      }
    }catch(e){}

    // 좌표 없음 → 최초 1회 위치 권한 요청 후 영구 저장
    if(!navigator.geolocation){setWx(w=>({...w,status:'error',desc:'위치 미지원'}));return;}
    setWx(w=>({...w,status:'loading'}));
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const{latitude:lat,longitude:lon}=pos.coords;
        localStorage.setItem(COORD_KEY,JSON.stringify({lat,lon}));
        fetchWx(lat,lon);
      },
      ()=>setWx(w=>({...w,status:'error',desc:'위치 권한 필요'}))
    );
  },[]);
  return wx;
}

    <div style={{padding:'8px 14px'}}>{data.plots.map(p=><div key={p.id} style={{marginBottom:8}}><Card style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',marginBottom:0}} onClick={()=>nav.push('plot-detail',{plot:p})}><Stripe w={52} h={52} label={plotMainCrop(p).split(' ')[0]} tone={p.tone}/><div style={{flex:1,minWidth:0}}><div style={{fontFamily:T.kr,fontSize:16,fontWeight:700,color:T.ink}}>{p.name}</div><div style={{fontFamily:T.kr,fontSize:16,color:T.s,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{plotCropList(p)} · {p.area}</div></div><button onClick={e=>{e.stopPropagation();setSelId(selId===p.id?null:p.id);}} style={{background:'#FFF5F5',border:`1px solid ${T.red}40`,borderRadius:7,padding:'4px 8px',color:T.red,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:T.kr}}>삭제</button></Card>{selId===p.id&&<div style={{background:'#FFF3F0',border:`1px solid ${T.red}40`,borderRadius:12,padding:'12px 14px',marginTop:4}}><div style={{fontFamily:T.kr,fontSize:15,color:T.ink,marginBottom:10}}><b>'{p.name}'</b>을 삭제하시겠습니까?</div><div style={{display:'flex',gap:8}}><button onClick={()=>setSelId(null)} style={{flex:1,padding:'9px',borderRadius:9,border:`1px solid ${T.bd}`,background:'#fff',fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.s,cursor:'pointer'}}>취소</button><button onClick={()=>{deletePlot&&deletePlot(p.id);setSelId(null);}} style={{flex:1,padding:'9px',borderRadius:9,border:'none',background:T.red,color:'#fff',fontFamily:T.kr,fontSize:15,fontWeight:700,cursor:'pointer'}}>삭제 확인</button></div></div>}</div>)}</div>
  </div>;
}
function MapPickerPopup({onConfirm,onClose,initLat,initLon,vworldKey}){
  const mapRef    = useRef(null);
  const leafRef   = useRef(null);
  const markerRef = useRef(null);
  const pcRef     = useRef(null);
  const inputRef  = useRef(null);

  const [tab,setTab]             = useState('search');
  const [query,setQuery]         = useState('');
  const [results,setResults]     = useState([]);
  const [searching,setSearching] = useState(false);
  const [searchErr,setSearchErr] = useState('');
  const [selAddr,setSelAddr]     = useState('');
  const [selLat,setSelLat]       = useState(initLat||37.5174);
  const [selLon,setSelLon]       = useState(initLon||127.0473);
  const [pcMsg,setPcMsg]         = useState('로딩 중...');

  /* ── JSONP 헬퍼 (CORS 우회) ── */
  const jsonp = (url, timeout=8000) => new Promise((res,rej)=>{
    const cb = '_vw_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const s  = document.createElement('script');
    s.id = cb;
    const done = (data)=>{ delete window[cb]; s.remove(); res(data); };
    window[cb] = done;
    s.onerror  = ()=>{ delete window[cb]; s.remove(); rej(new Error('load fail')); };
    s.src = url + '&callback='+cb;
    document.head.appendChild(s);
    setTimeout(()=>{ if(window[cb]){ delete window[cb]; s.remove(); rej(new Error('timeout')); } }, timeout);
  });

  /* ── VWorld 주소 검색 (JSONP) ── */
  const searchVworld = async (q) => {
    if(!q.trim()) return;
    setSearching(true); setSearchErr(''); setResults([]);

    const BASE_PARCEL = 'https://api.vworld.kr/req/search'
      +'?service=search&request=search&version=2.0&crs=epsg:4326'
      +'&type=address&category=parcel&format=json&errorformat=json'
      +'&size=10&page=1';
    const BASE_ROAD = 'https://api.vworld.kr/req/search'
      +'?service=search&request=search&version=2.0&crs=epsg:4326'
      +'&type=address&category=road&format=json&errorformat=json'
      +'&size=10&page=1';

    try{
      // 지번·도로명 동시 검색
      const [parcelRes, roadRes] = await Promise.allSettled([
        jsonp(BASE_PARCEL+'&query='+encodeURIComponent(q)+'&key='+vworldKey),
        jsonp(BASE_ROAD  +'&query='+encodeURIComponent(q)+'&key='+vworldKey),
      ]);

      const parcelItems = (parcelRes.status==='fulfilled'
        ? parcelRes.value?.response?.result?.items||[] : [])
        .map(it=>({...it,_addrType:'지번'}));

      const roadItems = (roadRes.status==='fulfilled'
        ? roadRes.value?.response?.result?.items||[] : [])
        .map(it=>({...it,_addrType:'도로명'}));

      // 좌표 기준 중복 제거 후 합산 (지번 우선, 도로명 추가)
      const seen = new Set();
      const merged = [...parcelItems, ...roadItems].filter(it=>{
        const key = (it.point?.x||'')+'_'+(it.point?.y||'');
        if(!key||key==='_') return true;
        if(seen.has(key)) return false;
        seen.add(key); return true;
      });

      if(merged.length===0) setSearchErr('검색 결과가 없습니다. 지번 또는 도로명 주소를 다시 입력해보세요.');
      setResults(merged);
    }catch(e){
      setSearchErr('검색 오류: '+e.message+'. 잠시 후 다시 시도해주세요.');
    }
    setSearching(false);
  };

  /* ── VWorld 역지오코딩 (JSONP) ── */
  const reverseVworld = async (lat,lon) => {
    if(!vworldKey) return null;
    try{
      const data = await jsonp(
        'https://api.vworld.kr/req/address'
        +'?service=address&request=getaddress&version=2.0&crs=epsg:4326'
        +'&point='+lon+','+lat
        +'&format=json&type=both&simple=false'
        +'&key='+vworldKey
      );
      const items = data?.response?.result||[];
      const p = items.find(i=>i.type==='parcel') || items[0];
      return p?.text||null;
    }catch(e){ return null; }
  };

  /* ── 역지오코딩 (VWorld 우선 → Nominatim 폴백) ── */
  const reverseGeo = async (lat,lon) => {
    const vw = await reverseVworld(lat,lon);
    if(vw) return vw;
    try{
      const r=await fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=ko');
      const d=await r.json(); const a=d.address||{};
      return[a.road||a.hamlet||'',a.village||a.town||a.city||'',a.county||'',a.state||''].filter(Boolean).slice(0,3).join(' ')||'';
    }catch(e){ return lat.toFixed(5)+', '+lon.toFixed(5); }
  };

  /* ── 결과 선택: 검색 타입에 맞는 주소 형식 사용 ── */
  const pickItem = item => {
    const pt = item.point||{};
    const lat = parseFloat(pt.y); const lon = parseFloat(pt.x);
    const isRoad = item._addrType === '도로명';
    const addr = isRoad
      ? (item.address?.road   || item.address?.parcel || item.title || '')
      : (item.address?.parcel || item.address?.road   || item.title || '');
    setSelAddr(addr); setSelLat(lat); setSelLon(lon);
    setTab('map');
    if(leafRef.current){ leafRef.current.setView([lat,lon],18); }
    if(markerRef.current){ markerRef.current.setLatLng([lat,lon]); }
  };

  const moveMarker = (lat,lon,addr)=>{ setSelLat(lat);setSelLon(lon);if(addr)setSelAddr(addr);leafRef.current?.setView([lat,lon],17);markerRef.current?.setLatLng([lat,lon]); };

  /* ── 카카오 주소 embed (보조) ── */
  useEffect(()=>{
    if(tab!=='daum'||!pcRef.current) return;
    let timer;
    const tryInit=()=>{
      if(!window.daum?.Postcode){ setPcMsg('로딩 중...'); timer=setTimeout(tryInit,300); return; }
      setPcMsg('');
      pcRef.current.innerHTML='';
      new window.daum.Postcode({
        width:'100%', height:'100%',
        oncomplete: async data=>{
          const road=data.roadAddress||''; const jibun=data.jibunAddress||data.autoJibunAddress||'';
          const bldg=data.buildingName?' ('+data.buildingName+')':'';
          const addr=(road||jibun)+bldg;
          setSelAddr(addr); setTab('map');
          // VWorld JSONP 지오코딩
          const sido={경기:'경기도',서울:'서울특별시',부산:'부산광역시',대구:'대구광역시',인천:'인천광역시',광주:'광주광역시',대전:'대전광역시',울산:'울산광역시',경북:'경상북도',경남:'경상남도',충북:'충청북도',충남:'충청남도',전북:'전라북도',전남:'전라남도',강원:'강원도',제주:'제주특별자치도',세종:'세종특별자치시'}[data.sido]||data.sido;
          const fullJibun=[sido,data.sigungu,data.bname1,data.bname2||data.bname].filter(Boolean).join(' ')
            +' '+(data.bnum||'')+(data.bmain&&data.bmain!=='0'?'-'+data.bmain:'');
          try{
            const d2 = await jsonp('https://api.vworld.kr/req/address?service=address&request=getcoord&version=2.0&crs=epsg:4326&address='+encodeURIComponent(fullJibun.trim())+'&refine=true&simple=false&format=json&type=parcel&key='+vworldKey);
            const pt=d2?.response?.result?.point;
            if(pt) moveMarker(parseFloat(pt.y),parseFloat(pt.x),addr);
          }catch(e){}
        }
      }).embed(pcRef.current,{autoClose:false});
    };
    tryInit();
    return()=>clearTimeout(timer);
  },[tab,vworldKey]);

  /* ── Leaflet ── */
  useEffect(()=>{
    if(tab!=='map'||!mapRef.current||leafRef.current) return;
    const L=window.L;
    const map=L.map(mapRef.current).setView([selLat,selLon],selLat===37.5174?14:17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    const icon=L.divIcon({className:'',html:'<div style="width:26px;height:26px;background:#3A7D4C;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 10px rgba(0,0,0,.4)"></div>',iconAnchor:[13,13]});
    const marker=L.marker([selLat,selLon],{icon,draggable:true}).addTo(map);
    markerRef.current=marker;leafRef.current=map;
    const upd=async(la,lo)=>{ setSelLat(la);setSelLon(lo); setSelAddr(await reverseGeo(la,lo)); };
    marker.on('dragend',e=>{const p=e.target.getLatLng();upd(p.lat,p.lng);});
    map.on('click',e=>{marker.setLatLng(e.latlng);upd(e.latlng.lat,e.latlng.lng);});
    /* 최초 1회만 권한 요청 — 저장된 좌표 우선, 없으면 이미 허용된 경우만 조용히 호출 */
    (async()=>{
      if(selLat!==37.5174) return; // 이미 위치 있으면 건너뜀
      try{
        const saved=JSON.parse(localStorage.getItem('farmingCoords')||'null');
        if(saved?.lat&&saved?.lon){
          map.setView([saved.lat,saved.lon],15);
          marker.setLatLng([saved.lat,saved.lon]);
          upd(saved.lat,saved.lon);
          return;
        }
        // 저장된 좌표 없음 → 이미 권한 허용됐으면 조용히 가져오기 (다이얼로그 없음)
        if(navigator.permissions){
          const perm=await navigator.permissions.query({name:'geolocation'});
          if(perm.state==='granted'){
            navigator.geolocation.getCurrentPosition(p=>{
              const{latitude:lat,longitude:lon}=p.coords;
              localStorage.setItem('farmingCoords',JSON.stringify({lat,lon}));
              map.setView([lat,lon],15);
              marker.setLatLng([lat,lon]);
              upd(lat,lon);
            });
          }
          // 'prompt' 또는 'denied' 이면 권한 요청 안 함 (PermissionScreen에서 처리)
        }
      }catch(e){}
    })();
    return()=>{map.remove();leafRef.current=null;};
  },[tab]);

  const TABS=[{k:'search',l:'🔍 주소 검색'},{k:'daum',l:'📮 우편번호'},{k:'map',l:'🗺️ 지도'}];

  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',zIndex:900,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div style={{background:'#fff',borderRadius:'22px 22px 0 0',height:'92%',display:'flex',flexDirection:'column',overflow:'hidden'}}>

        {/* 헤더 */}
        <div style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px 10px',borderBottom:'0.5px solid rgba(60,60,67,.1)'}}>
          <button onClick={onClose} style={{background:'none',border:'none',fontFamily:T.kr,fontSize:15,color:T.s,cursor:'pointer',padding:0}}>취소</button>
          <span style={{fontFamily:T.kr,fontSize:16,fontWeight:700,color:T.ink}}>위치 선택</span>
          <button onClick={()=>onConfirm(selAddr,selLat,selLon)}
            style={{background:'none',border:'none',fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.J,cursor:'pointer',padding:0}}>확인</button>
        </div>

        {/* 탭 */}
        <div style={{flexShrink:0,display:'flex',borderBottom:'0.5px solid rgba(60,60,67,.1)'}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{
              flex:1,padding:'10px 0',border:'none',
              background:tab===t.k?'#fff':'#F7F7F5',
              fontFamily:T.kr,fontSize:13,fontWeight:700,
              color:tab===t.k?T.J:T.s,cursor:'pointer',
              borderBottom:tab===t.k?'2.5px solid '+T.J:'2.5px solid transparent'}}>
              {t.l}
            </button>
          ))}
        </div>

        {/* ── 탭1: VWorld 주소 검색 ── */}
        {tab==='search'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{flexShrink:0,padding:'10px 12px 6px'}}>
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1,display:'flex',alignItems:'center',gap:8,background:'rgba(60,60,67,.07)',borderRadius:10,padding:'0 12px',height:42}}>
                  {I.srch(16,T.t)}
                  <input ref={inputRef} value={query}
                    onChange={e=>setQuery(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&searchVworld(query)}
                    placeholder="예) 수능리 83-1  또는  양평군 수능리"
                    style={{flex:1,border:'none',background:'none',outline:'none',fontFamily:T.kr,fontSize:15,color:T.ink}}/>
                  {query&&<button onClick={()=>{setQuery('');setResults([]);setSearchErr('');}} style={{background:'rgba(60,60,67,.18)',border:'none',borderRadius:999,width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:T.s,fontSize:10,flexShrink:0}}>✕</button>}
                </div>
                <button onClick={()=>searchVworld(query)}
                  disabled={searching}
                  style={{background:T.J,color:'#fff',border:'none',borderRadius:10,padding:'0 16px',fontFamily:T.kr,fontSize:14,fontWeight:700,cursor:'pointer',flexShrink:0,opacity:searching?.6:1}}>
                  {searching?'…':'검색'}
                </button>
              </div>
              <div style={{fontFamily:T.kr,fontSize:11,color:T.t,marginTop:5,paddingLeft:2}}>
                지번주소·도로명주소 동시 검색
              </div>
            </div>

            <div style={{flex:1,overflowY:'auto',padding:'0 12px 12px'}}>
              {searching&&(
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:32,gap:10}}>
                  <div style={{width:18,height:18,border:'2px solid '+T.J,borderTopColor:'transparent',borderRadius:999,animation:'spin 0.8s linear infinite'}}/>
                  <span style={{fontFamily:T.kr,fontSize:14,color:T.s}}>검색 중...</span>
                </div>
              )}
              {searchErr&&!searching&&(
                <div style={{padding:'20px 14px',background:'#FFF8E1',borderRadius:10,marginTop:6}}>
                  <div style={{fontFamily:T.kr,fontSize:13,color:'#7A5000'}}>{searchErr}</div>
                  <div style={{fontFamily:T.kr,fontSize:12,color:T.t,marginTop:6}}>
                    💡 지번: '강하면 수능리 83' 또는 '수능리 83'<br/>
                    💡 도로명: '강남대로 123' 또는 '테헤란로'
                  </div>
                </div>
              )}
              {results.length>0&&results.map((item,i)=>{
                const pt=item.point||{}; const a=item.address||{};
                const isRoad=item._addrType==='도로명';
                const mainAddr = isRoad ? (a.road||a.parcel||item.title||'') : (a.parcel||a.road||item.title||'');
                const subAddr  = isRoad ? (a.parcel||'') : (a.road||'');
                const badgeColor = isRoad ? '#1A73E8' : T.Ji;
                const badgeBg    = isRoad ? '#E8F0FE' : T.Js;
                return(
                  <div key={i} onClick={()=>pickItem(item)}
                    style={{display:'flex',alignItems:'flex-start',gap:12,padding:'13px 14px',
                      borderRadius:14,marginTop:7,
                      background:'#FAFCFA',
                      border:`0.5px solid ${isRoad?'#4285F430':'rgba(58,125,76,.15)'}`,
                      cursor:'pointer',
                      boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
                    <span style={{fontSize:18,flexShrink:0,marginTop:2}}>📍</span>
                    <div style={{flex:1,minWidth:0}}>
                      {/* 주소 타입 뱃지 */}
                      <span style={{display:'inline-block',fontSize:11,fontWeight:700,
                        color:badgeColor,background:badgeBg,
                        borderRadius:999,padding:'1px 7px',marginBottom:5,fontFamily:T.kr}}>
                        {item._addrType||'주소'}
                      </span>
                      {/* 메인 주소 */}
                      <div style={{fontFamily:T.kr,fontSize:14,fontWeight:700,color:T.ink,lineHeight:1.45}}>{mainAddr||item.title}</div>
                      {/* 서브 주소 (반대 형식) */}
                      {subAddr&&subAddr!==mainAddr&&(
                        <div style={{fontFamily:T.kr,fontSize:12,color:T.s,marginTop:3}}>{subAddr}</div>
                      )}
                      {/* 좌표 */}
                      {pt.x&&pt.y&&(
                        <div style={{fontFamily:T.mo,fontSize:11,color:T.t,marginTop:4}}>
                          {parseFloat(pt.y).toFixed(5)}, {parseFloat(pt.x).toFixed(5)}
                        </div>
                      )}
                    </div>
                    {I.chR(12,T.t)}
                  </div>
                );
              })}
              {results.length>0&&!searching&&(
                <div style={{padding:'8px 2px 2px',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontFamily:T.kr,fontSize:12,color:T.t}}>검색결과</span>
                  <span style={{fontFamily:T.en,fontSize:12,fontWeight:700,color:T.J}}>{results.length}건</span>
                  <span style={{fontFamily:T.kr,fontSize:11,color:T.t}}>
                    (지번 {results.filter(r=>r._addrType==='지번').length} · 도로명 {results.filter(r=>r._addrType==='도로명').length})
                  </span>
                </div>
              )}
              {!searching&&!searchErr&&results.length===0&&(
                <div style={{padding:'28px 0',textAlign:'center'}}>
                  <div style={{fontSize:36,marginBottom:10}}>🔍</div>
                  <div style={{fontFamily:T.kr,fontSize:14,color:T.s}}>주소를 입력하고 검색하세요</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:7,justifyContent:'center',marginTop:16}}>
                    {['수능리 83-1','양평군 강하면','양평군 수능리'].map(q=>(
                      <button key={q} onClick={()=>{setQuery(q);searchVworld(q);}}
                        style={{padding:'6px 12px',borderRadius:999,border:'0.5px solid rgba(60,60,67,.15)',background:'#fff',fontFamily:T.kr,fontSize:13,color:T.ink,cursor:'pointer'}}>
                        {q}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── 탭2: 카카오 우편번호 ── */}
        {tab==='daum'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
            {pcMsg&&(
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',zIndex:2}}>
                <div style={{textAlign:'center'}}>
                  <div style={{width:24,height:24,border:'2px solid '+T.J,borderTopColor:'transparent',borderRadius:999,animation:'spin 0.8s linear infinite',margin:'0 auto 12px'}}/>
                  <div style={{fontFamily:T.kr,fontSize:14,color:T.s}}>{pcMsg}</div>
                </div>
              </div>
            )}
            <div ref={pcRef} style={{flex:1,overflow:'hidden'}}/>
          </div>
        )}

        {/* ── 탭3: 지도 ── */}
        {tab==='map'&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div ref={mapRef} style={{flex:1,minHeight:0}}/>
            {selAddr&&(

function PermissionScreen({onDone}){
  const [perms,setPerms]=useState({
    location:{label:'위치',desc:'현재 위치 날씨 · 지도 핀 설정',icon:'📍',status:'idle'},
    mic:     {label:'마이크',desc:'음성 메모 녹음',              icon:'🎙️',status:'idle'},
    camera:  {label:'카메라',desc:'영수증 · 작업 사진 첨부',      icon:'📷',status:'idle'},
  });
  const [requesting,setRequesting]=useState(false);
  const [allDone,setAllDone]=useState(false);

  /* 이미 허용된 권한 확인 → 전부 granted면 자동 완료 */
  useEffect(()=>{
    (async()=>{
      if(!navigator.permissions) return;
      const map={location:'geolocation',mic:'microphone',camera:'camera'};
      const updates={};
      let allGranted=true;
      for(const[k,name] of Object.entries(map)){
        try{
          const r=await navigator.permissions.query({name});
          if(r.state==='granted') updates[k]={...perms[k],status:'granted'};
          else allGranted=false;
        }catch(e){ allGranted=false; }
      }
      if(Object.keys(updates).length) setPerms(p=>({...p,...updates}));
      if(allGranted){ setAllDone(true); setTimeout(()=>onDone(),600); }
    })();
  },[]);

  /* 모두 허용 버튼 */
  const requestAll=async()=>{
    setRequesting(true);
    setPerms(p=>({
      ...p,
      location:{...p.location,status:'requesting'},
      mic:{...p.mic,status:'requesting'},
      camera:{...p.camera,status:'requesting'}
    }));

    const mediaReq = navigator.mediaDevices?.getUserMedia({audio:true, video:true})
      .then(s=>{
        s.getTracks().forEach(t=>t.stop());
        setPerms(p=>({...p,mic:{...p.mic,status:'granted'},camera:{...p.camera,status:'granted'}}));
      })
      .catch(()=>{
        setPerms(p=>({...p,mic:{...p.mic,status:'denied'},camera:{...p.camera,status:'denied'}}));
      });

    const geoReq = new Promise(res=>{
      if(!navigator.geolocation){
        setPerms(p=>({...p,location:{...p.location,status:'denied'}}));
        res();return;
      }
      navigator.geolocation.getCurrentPosition(
        ()=>{ setPerms(p=>({...p,location:{...p.location,status:'granted'}})); res(); },
        ()=>{ setPerms(p=>({...p,location:{...p.location,status:'denied'}}));  res(); },
        {timeout:8000}
      );
    });

    await Promise.all([mediaReq, geoReq]);

    setRequesting(false);
    setAllDone(true);
    setTimeout(()=>onDone(),700);
  };

  const statusUI={
    idle:      {color:T.t,    bg:'rgba(60,60,67,.06)', label:'대기'},
    requesting:{color:T.J,    bg:T.Js,                 label:'요청 중...'},
    granted:   {color:'#1C551C',bg:'#E8F5E9',           label:'허용됨 ✓'},
    denied:    {color:T.red,  bg:'#FFEBEE',             label:'거부됨'},
  };

  return(
    <div style={{position:'absolute',inset:0,zIndex:600,display:'flex',flexDirection:'column',
      background:'linear-gradient(160deg,#1B3A28 0%,#2D5C3C 60%,#1A3325 100%)'}}>

      <style>{`
        @keyframes permIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes checkPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
      `}</style>

      {/* 상단 아이콘 + 타이틀 */}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 28px',animation:'permIn 0.5s ease both'}}>
        <div style={{fontSize:52,marginBottom:16}}>🌿</div>
        <div style={{fontFamily:T.kr,fontSize:24,fontWeight:800,color:'#fff',textAlign:'center',marginBottom:8}}>
          앱 권한 설정
        </div>
        <div style={{fontFamily:T.kr,fontSize:14,color:'rgba(255,255,255,.65)',textAlign:'center',lineHeight:1.7,marginBottom:32}}>
          아래 권한을 허용하면 모든 기능을<br/>바로 사용할 수 있습니다
        </div>

        {/* 권한 카드 목록 */}
        <div style={{width:'100%',display:'flex',flexDirection:'column',gap:10}}>
          {Object.entries(perms).map(([k,p])=>{
            const st=statusUI[p.status]||statusUI.idle;
            return(
              <div key={k} style={{
                display:'flex',alignItems:'center',gap:14,
                padding:'14px 18px',borderRadius:16,
                background:'rgba(255,255,255,0.10)',
                backdropFilter:'blur(8px)',
                border:'1px solid rgba(255,255,255,0.15)',
                animation:'permIn 0.5s ease both',
              }}>
                <div style={{
                  width:46,height:46,borderRadius:14,
                  background:'rgba(255,255,255,0.15)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:22,flexShrink:0,
                }}>{p.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:T.kr,fontSize:15,fontWeight:700,color:'#fff'}}>{p.label}</div>
                  <div style={{fontFamily:T.kr,fontSize:12,color:'rgba(255,255,255,.6)',marginTop:2}}>{p.desc}</div>
                </div>
                <div style={{
                  padding:'4px 10px',borderRadius:999,
                  background:st.bg,
                  fontFamily:T.kr,fontSize:12,fontWeight:700,
                  color:st.color,flexShrink:0,
                  animation:p.status==='granted'?'checkPop 0.3s ease':'none',
                }}>{st.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 하단 버튼 */}
      <div style={{padding:'0 24px 40px',display:'flex',flexDirection:'column',gap:10}}>
        {!allDone?(
          <>
            <button onClick={requestAll} disabled={requesting} style={{
              width:'100%',padding:'16px',borderRadius:16,border:'none',
              background:requesting?'rgba(255,255,255,0.2)':'#fff',
              fontFamily:T.kr,fontSize:16,fontWeight:800,
              color:requesting?'rgba(255,255,255,.7)':T.J,
              cursor:requesting?'default':'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',gap:8,
              boxShadow:'0 4px 20px rgba(0,0,0,0.25)',
            }}>
              {requesting
                ?<><div style={{width:16,height:16,border:`2px solid ${T.J}`,borderTopColor:'transparent',borderRadius:999,animation:'spin 0.8s linear infinite'}}/> 권한 요청 중...</>
                :'🔓 모두 허용하기'
              }
            </button>
            <button onClick={onDone} style={{
              background:'none',border:'none',
              fontFamily:T.kr,fontSize:13,
              color:'rgba(255,255,255,.45)',
              cursor:'pointer',padding:'8px',textAlign:'center',
            }}>나중에 설정</button>
          </>
        ):(
          <div style={{textAlign:'center',animation:'permIn 0.4s ease',color:'#fff',fontFamily:T.kr,fontSize:15,fontWeight:600}}>
            ✅ 설정 완료! 앱을 시작합니다...
          </div>
        )}
      </div>
    </div>
  );
}

function SearchPanel({data,onClose,nav,mode,onMode}){
  const [q,setQ]=useState('');
  const [tab,setTab]=useState('local');
  const inp=useRef();

  useEffect(()=>{setTimeout(()=>inp.current?.focus(),120);},[]);

  /* ── 로컬 검색 ── */
  const r=React.useMemo(()=>{
    if(!q.trim())return{plots:[],diary:[],ledger:[]};
    const kw=q.toLowerCase();
    return{
      plots:data.plots.filter(p=>p.name?.toLowerCase().includes(kw)||p.area?.toLowerCase().includes(kw)||p.crops?.some(c=>c.name?.toLowerCase().includes(kw))||p.address?.toLowerCase().includes(kw)),
      diary:[...data.diary].sort((a,b)=>b.id-a.id).filter(d=>d.detail?.toLowerCase().includes(kw)||d.workType?.includes(kw)||d.cropVal?.toLowerCase().includes(kw)||d.date?.includes(kw)).slice(0,8),
      ledger:[...data.ledger].sort((a,b)=>b.id-a.id).filter(l=>l.name?.toLowerCase().includes(kw)||l.cat?.includes(kw)||l.vendor?.toLowerCase().includes(kw)||l.date?.includes(kw)).slice(0,8),
    };
  },[q,data]);
  const localTotal=r.plots.length+r.diary.length+r.ledger.length;

  const gOpen=(kw)=>window.open(`https://www.google.com/search?q=${encodeURIComponent(kw)}`,'_blank');
  const accent=mode==='journal'?T.J:T.L;
  const fmt=n=>(n||0).toLocaleString('ko-KR');

  const QUICK=[
    {label:'벼 재배',icon:'🌾'},{label:'토마토 병충해',icon:'🍅'},{label:'마늘 파종',icon:'🧄'},

    {label:'농촌진흥청',url:'https://www.rda.go.kr',icon:'🔬'},
    {label:'농업기상정보',url:'https://www.weather.go.kr/w/agri/main.do',icon:'🌦'},

            background:'linear-gradient(135deg,#4285F4,#1A73E8)',
            color:'#fff',fontFamily:T.kr,fontSize:16,fontWeight:700,
            cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
            gap:10,marginBottom:14,boxShadow:'0 4px 16px rgba(66,133,244,.35)'}}>

          "{q}" 구글에서 검색하기
        </button>

      background:T.bg,
      fontFamily:T.kr,
      // safe-area padding so content never hides under notch / home bar
      paddingTop:  isMobile ? 'env(safe-area-inset-top,   0px)' : 0,
      paddingBottom: 0,  // TabBar handles its own bottom padding
    }}>
      <style>{`
        @keyframes spin  {to{transform:rotate(360deg)}}
        @keyframes pulse {0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes wave  {from{transform:scaleY(.3)}to{transform:scaleY(1.1)}}
      `}</style>

      {/* Main content area */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative'}}>
        {splashDone&&!permDone&&<PermissionScreen onDone={finishPerm}/>}
        {cur
          ? <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderPushed()}</div>
          : <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderTab()}</div>
        }
        {/* Overlays (absolute inside relative parent) */}
        {toast      && <Toast msg={toast.msg} color={toast.ok?T.J:T.red}/>}
        {showSearch && <SearchPanel data={data} onClose={()=>setShowSearch(false)} nav={nav} mode={mode} onMode={goMode}/>}
        {showNotif  && <NotifPanel  notifications={notifications}
                         onRead={id=>setNotifications(n=>n.map(x=>x.id===id?{...x,read:true}:x))}
                         onReadAll={()=>setNotifications(n=>n.map(x=>({...x,read:true})))}
                         onClose={()=>setShowNotif(false)}/>}
      </div>

      {/* TabBar sits OUTSIDE the scrollable area, at the very bottom */}
      {!cur && <TabBar tabs={tabs} active={tab}
                 onTab={t=>{closeOverlays();if(t==='add')nav.push(mode==='journal'?'add-work':'add-txn',{});else goTab(t);}}
                 accent={accent}/>}

      {!splashDone && <SplashScreen onDone={()=>setSplashDone(true)}/>}
    </div>
  );

  if(isMobile) return screen;

  // Desktop: phone mockup wrapper
  return (
    <div style={{
      position:'fixed', top:0, left:0, right:0, bottom:0,
      display:'flex', alignItems:'center', justifyContent:'center',
      background:'#EFEEEA',
    }}>
      {!splashDone && <SplashScreen onDone={()=>setSplashDone(true)}/>}
      <div style={{
        width:390, height:Math.min(window.innerHeight-32, 844),
        borderRadius:40, overflow:'hidden', position:'relative',
        background:T.bg,
        boxShadow:'0 20px 60px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.10)',
        display:'flex', flexDirection:'column',
      }}>
        {/* Phone top bar */}
        <div style={{flexShrink:0,background:'#F2F2F7',position:'relative',zIndex:20}}>
          <div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',width:120,height:33,borderRadius:20,background:'#000',zIndex:30}}/>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 24px 6px'}}>
            <span style={{fontFamily:'-apple-system,system-ui',fontWeight:600,fontSize:14,color:'#000'}}>9:41</span>
            <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#000" strokeOpacity=".3" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#000"/></svg>
          </div>
        </div>
        {/* App content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:T.bg,position:'relative'}}>
          <style>{`
            @keyframes spin  {to{transform:rotate(360deg)}}
            @keyframes pulse {0%,100%{opacity:1}50%{opacity:.3}}
            @keyframes wave  {from{transform:scaleY(.3)}to{transform:scaleY(1.1)}}
          `}</style>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
            {splashDone&&!permDone&&<PermissionScreen onDone={finishPerm}/>}
            {cur
              ? <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderPushed()}</div>
              : <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderTab()}</div>
            }
            {toast      && <Toast msg={toast.msg} color={toast.ok?T.J:T.red}/>}
            {showSearch && <SearchPanel data={data} onClose={()=>setShowSearch(false)} nav={nav} mode={mode} onMode={goMode}/>}
            {showNotif  && <NotifPanel  notifications={notifications}
                             onRead={id=>setNotifications(n=>n.map(x=>x.id===id?{...x,read:true}:x))}
                             onReadAll={()=>setNotifications(n=>n.map(x=>({...x,read:true})))}
                             onClose={()=>setShowNotif(false)}/>}
          </div>
          {!cur && <TabBar tabs={tabs} active={tab}
                     onTab={t=>{closeOverlays();if(t==='add')nav.push(mode==='journal'?'add-work':'add-txn',{});else goTab(t);}}
                     accent={accent}/>}
        </div>
        {/* Phone bottom bar */}
        <div style={{flexShrink:0,height:20,background:'#fff',display:'flex',justifyContent:'center',alignItems:'center'}}>
          <div style={{width:120,height:4,borderRadius:100,background:'rgba(0,0,0,.18)'}}/>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
