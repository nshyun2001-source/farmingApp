function MeScreen({data,mode,onMode,onNameChange,onReset}){
  const{plots,diary,ledger}=data;
  const DEFAULT_INFO={name:'',farm:'',phone:'',addr:'',bizno:'',cert:'',memo:''};
  const [info,setInfo]=useState(DEFAULT_INFO);
  const [editField,setEditField]=useState(null);
  const [tempVal,setTempVal]=useState('');
  const [showReset,setShowReset]=useState(false);
  const totalArea=plots.reduce((a,p)=>a+parseInt((p.area||'0').replace(/[^0-9]/g,'')||0),0);
  const thisMonth=new Date().toISOString().slice(0,7);
  const monthWork=diary.filter(d=>d.date&&d.date.startsWith(thisMonth)).length;
  const totalIncome=ledger.filter(l=>l.type==='income').reduce((a,l)=>a+l.amount,0);
  const totalExpense=ledger.filter(l=>l.type==='expense').reduce((a,l)=>a+l.amount,0);
  const FIELDS=[{k:'name',l:'성명',t:'text'},{k:'farm',l:'농장명',t:'text'},{k:'phone',l:'전화번호',t:'tel'},{k:'addr',l:'주소',t:'text'},{k:'bizno',l:'경영체번호',t:'text'},{k:'cert',l:'인증구분',t:'text'},{k:'memo',l:'메모',t:'memo'}];
  const openEdit=(f)=>{setTempVal(info[f.k]);setEditField(f);};
  const fmtPhone=v=>{const n=v.replace(/[^0-9]/g,'');if(n.length<=3)return n;if(n.length<=7)return n.slice(0,3)+'-'+n.slice(3);return n.slice(0,3)+'-'+n.slice(3,7)+'-'+n.slice(7,11);};
  const commitEdit=()=>{if(editField){const val=editField.k==='phone'?fmtPhone(tempVal):tempVal;setInfo(i=>{const next={...i,[editField.k]:val};if(editField.k==='name'&&onNameChange)onNameChange(val);return next;});setEditField(null);}};
  const onTempChange=e=>{const v=e.target.value;setTempVal(editField?.k==='phone'?fmtPhone(v):v);};
  return<div style={{flex:1,overflowY:'auto',background:T.bg,position:'relative'}}>
    <div style={{background:`linear-gradient(160deg,${T.Ji},${T.J})`,padding:'24px 20px 36px'}}>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{width:68,height:68,borderRadius:999,background:'rgba(255,255,255,.22)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,flexShrink:0,boxShadow:'0 4px 16px rgba(0,0,0,.15)'}}>👨‍🌾</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:T.kr,fontSize:23,fontWeight:900,color:'#fff'}}>{info.name||'농업인'}</div>
          <div style={{fontFamily:T.kr,fontSize:16,color:'rgba(255,255,255,.78)',marginTop:2}}>{info.farm}</div>
          {info.cert&&<div style={{display:'inline-block',background:'rgba(255,255,255,.18)',borderRadius:20,padding:'2px 10px',fontSize:15,color:'rgba(255,255,255,.9)',marginTop:6,fontFamily:T.kr,backdropFilter:'blur(4px)'}}>{info.cert}</div>}
        </div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,padding:'16px 14px 0'}}>
      {[{label:'내 필지',value:`${plots.length}곳`,sub:`총 ${totalArea.toLocaleString()}㎡`},{label:'이달 작업',value:`${monthWork}건`,sub:'기록'},{label:'총 수입',value:`₩${Math.round(totalIncome/10000)}만`,sub:'누적'},{label:'순손익',value:`₩${Math.round((totalIncome-totalExpense)/10000)}만`,sub:totalIncome>=totalExpense?'흑자':'적자',color:totalIncome>=totalExpense?T.J:T.red}]
        .map(c=><div key={c.label} style={{background:T.card,borderRadius:16,padding:'14px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.06)'}}>
          <div style={{fontFamily:T.kr,fontSize:15,color:T.s,fontWeight:600,letterSpacing:.3}}>{c.label}</div>
          <div style={{fontFamily:T.kr,fontSize:22,fontWeight:900,color:c.color||T.ink,marginTop:4}}>{c.value}</div>
          <div style={{fontFamily:T.kr,fontSize:15,color:T.t,marginTop:2}}>{c.sub}</div>
        </div>)}
    </div>
    <div style={{margin:'14px 14px 0',background:T.card,borderRadius:16,overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,0.06)'}}>
      <div style={{padding:'12px 16px',borderBottom:`0.5px solid ${T.dv}`,fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.s,letterSpacing:.6}}>농업인 정보</div>
      {FIELDS.map((f,i,a)=><div key={f.k} onClick={()=>openEdit(f)} style={{display:'flex',alignItems:'center',padding:'13px 16px',borderBottom:i<a.length-1?`0.5px solid ${T.dv}`:'none',cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='#F4F7F4'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <span style={{fontFamily:T.kr,fontSize:15,color:T.s,width:80,flexShrink:0}}>{f.l}</span>
        <span style={{fontFamily:T.kr,fontSize:16,fontWeight:600,color:info[f.k]?T.ink:T.t,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{info[f.k]||'미입력'}</span>
        {I.chR(13,T.t)}
      </div>)}
    </div>
    <div style={{height:8}}/>
    <div style={{margin:'0 14px',background:T.card,borderRadius:16,overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,0.06)'}}>
      <div style={{padding:'12px 16px',borderBottom:`0.5px solid ${T.dv}`,display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:16}}>💾</span><span style={{fontFamily:T.kr,fontSize:16,color:T.s,flex:1}}>데이터는 세션 중 유지됩니다</span></div>
      <div onClick={()=>setShowReset(true)} style={{padding:'13px 16px',display:'flex',alignItems:'center',cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='#FEF0EE'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <span style={{fontFamily:T.kr,fontSize:15,color:T.red,fontWeight:700,flex:1}}>데이터 전체 초기화</span>
        {I.chR(13,T.red)}
      </div>
    </div>
    <div style={{height:40}}/>
    {editField&&<>
      <div onClick={()=>setEditField(null)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.35)',zIndex:400,backdropFilter:'blur(2px)'}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,background:'#fff',borderRadius:'22px 22px 0 0',padding:'0 0 24px',zIndex:401,boxShadow:'0 -8px 40px rgba(0,0,0,0.18)'}}>
        <div style={{display:'flex',justifyContent:'center',padding:'12px 0 8px'}}><div style={{width:36,height:4,borderRadius:99,background:'rgba(60,60,67,.18)'}}/></div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 20px 16px'}}>
          <button onClick={()=>setEditField(null)} style={{background:'none',border:'none',fontFamily:T.kr,fontSize:15,color:T.s,cursor:'pointer',padding:0}}>취소</button>
          <span style={{fontFamily:T.kr,fontSize:16,fontWeight:700,color:T.ink}}>{editField.l} 수정</span>
          <button onClick={commitEdit} style={{background:'none',border:'none',fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.J,cursor:'pointer',padding:0}}>완료</button>
        </div>
        <div style={{padding:'0 20px'}}>
          {editField.t==='memo'
            ?<textarea autoFocus value={tempVal} onChange={onTempChange} rows={4} placeholder="농장 메모를 입력하세요" style={{width:'100%',border:`1.5px solid ${T.J}60`,borderRadius:14,padding:'14px 16px',fontSize:16,color:T.ink,fontFamily:T.kr,outline:'none',resize:'none',boxSizing:'border-box',background:'#F7FAF7',lineHeight:1.6}}/>
            :<div style={{background:'#F7FAF7',borderRadius:14,border:`1.5px solid ${T.J}60`,padding:'0 16px',display:'flex',alignItems:'center'}}>
              <input autoFocus type={editField.k==='phone'?'tel':editField.t||'text'} value={tempVal} onChange={onTempChange} onKeyDown={e=>{if(e.key==='Enter')commitEdit();}} style={{flex:1,border:'none',background:'none',outline:'none',padding:'16px 0',fontSize:17,color:T.ink,fontFamily:T.kr}}/>
              {tempVal&&<button onClick={()=>setTempVal('')} style={{background:'rgba(60,60,67,.15)',border:'none',borderRadius:999,width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:16,color:T.s,flexShrink:0}}>✕</button>}
            </div>
          }
          <div style={{fontFamily:T.kr,fontSize:16,color:T.t,marginTop:8,paddingLeft:4}}>{editField.l} 항목을 입력 후 완료를 눌러주세요</div>
        </div>
      </div>
    </>}
    {showReset&&<>
      <div onClick={()=>setShowReset(false)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',zIndex:400,backdropFilter:'blur(2px)'}}/>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#fff',borderRadius:20,padding:'28px 24px',zIndex:401,width:'80%',boxShadow:'0 8px 40px rgba(0,0,0,0.2)',textAlign:'center'}}>
        <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
        <div style={{fontFamily:T.kr,fontSize:16,fontWeight:700,color:T.ink,marginBottom:8}}>데이터 초기화</div>
        <div style={{fontFamily:T.kr,fontSize:15,color:T.s,marginBottom:20,lineHeight:1.6}}>모든 필지·일지·장부 데이터가<br/>삭제됩니다. 계속하시겠습니까?</div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>setShowReset(false)} style={{flex:1,padding:'11px',borderRadius:12,border:`1px solid ${T.bd}`,background:'#fff',fontFamily:T.kr,fontSize:16,fontWeight:700,color:T.s,cursor:'pointer'}}>취소</button>
          <button onClick={()=>{onReset&&onReset();setShowReset(false);}} style={{flex:1,padding:'11px',borderRadius:12,border:'none',background:T.red,color:'#fff',fontFamily:T.kr,fontSize:16,fontWeight:700,cursor:'pointer'}}>초기화</button>
        </div>
      </div>
    </>}
  </div>;
}


function SplashScreen({onDone}){
  const [phase,setPhase]=useState(0);
  // phase 0: show logo  1: fade out
  useEffect(()=>{
    const t1=setTimeout(()=>setPhase(1), 1800);
    const t2=setTimeout(()=>onDone(),    2400);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  return(
    <div style={{
      position:'fixed',inset:0,zIndex:9999,
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(160deg,#1B3A28 0%,#2D5C3C 50%,#1A3325 100%)',

function SearchPanel({data,onClose,nav,mode,onMode}){
  const [q,setQ]=useState('');
  const inp=useRef();
  useEffect(()=>{setTimeout(()=>inp.current?.focus(),120);},[]);
  const r=React.useMemo(()=>{
    if(!q.trim())return{plots:[],diary:[],ledger:[]};
    const kw=q.toLowerCase();
    return{
      plots:data.plots.filter(p=>p.name?.toLowerCase().includes(kw)||p.area?.toLowerCase().includes(kw)||p.crops?.some(c=>c.name?.toLowerCase().includes(kw))||p.address?.toLowerCase().includes(kw)),
      diary:[...data.diary].sort((a,b)=>b.id-a.id).filter(d=>d.detail?.toLowerCase().includes(kw)||d.workType?.includes(kw)||d.cropVal?.toLowerCase().includes(kw)||d.date?.includes(kw)).slice(0,8),
      ledger:[...data.ledger].sort((a,b)=>b.id-a.id).filter(l=>l.name?.toLowerCase().includes(kw)||l.cat?.includes(kw)||l.vendor?.toLowerCase().includes(kw)||l.date?.includes(kw)).slice(0,8),
    };
  },[q,data]);
  const total=r.plots.length+r.diary.length+r.ledger.length;
  const accent=mode==='journal'?T.J:T.L;
  const fmt=n=>(n||0).toLocaleString('ko-KR');
  return<div style={{position:'absolute',inset:0,zIndex:500,display:'flex',flexDirection:'column',background:T.bg}}>
    <div style={{flexShrink:0,padding:'10px 14px 8px',background:T.bg,borderBottom:`0.5px solid ${T.bd}`}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8,background:'rgba(60,60,67,.07)',borderRadius:12,padding:'0 12px',height:40}}>
          {I.srch(16,T.t)}
          <input ref={inp} value={q} onChange={e=>setQ(e.target.value)} placeholder="필지, 일지, 거래 검색..." style={{flex:1,border:'none',background:'none',outline:'none',fontSize:15,color:T.ink,fontFamily:T.kr}}/>
          {q&&<button onClick={()=>setQ('')} style={{background:'rgba(60,60,67,.18)',border:'none',borderRadius:999,width:17,height:17,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:T.s,fontSize:14,flexShrink:0}}>✕</button>}
        </div>
        <button onClick={onClose} style={{border:'none',background:'none',fontFamily:T.kr,fontSize:16,fontWeight:700,color:accent,cursor:'pointer',padding:'4px 0',flexShrink:0}}>취소</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'0 14px 20px'}}>
      {!q.trim()&&<div style={{padding:'36px 0',textAlign:'center'}}>
        <div style={{fontSize:38,marginBottom:10}}>🔍</div>
        <div style={{fontFamily:T.kr,fontSize:16,color:T.s}}>필지명, 작업 내용, 거래 항목을 검색하세요</div>
        <div style={{marginTop:20,display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center'}}>
          {['파종','관수','방제','수확','비료','농약'].map(k=><button key={k} onClick={()=>setQ(k)} style={{padding:'7px 14px',borderRadius:999,border:`0.5px solid ${T.bd}`,background:'#fff',fontFamily:T.kr,fontSize:15,color:T.ink,cursor:'pointer'}}>{k}</button>)}
        </div>
      </div>}
      {q.trim()&&total===0&&<div style={{padding:'48px 0',textAlign:'center'}}>
        <div style={{fontSize:34,marginBottom:10}}>😶</div>
        <div style={{fontFamily:T.kr,fontSize:16,color:T.s}}>'{q}'에 대한 결과가 없습니다</div>
      </div>}
      {r.plots.length>0&&<div style={{marginTop:14}}>
        <div style={{fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.t,letterSpacing:.8,marginBottom:8,textTransform:'uppercase'}}>필지 ({r.plots.length})</div>
        {r.plots.map(p=><div key={p.id} onClick={()=>{nav.push('plot-detail',{plot:p});onClose();}} style={{display:'flex',alignItems:'center',gap:10,background:T.card,borderRadius:12,padding:'10px 12px',marginBottom:6,cursor:'pointer',border:`0.5px solid ${T.bd}`}}>
          <div style={{width:36,height:36,borderRadius:10,background:accent+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{I.map(17,accent)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:T.kr,fontSize:16,fontWeight:700,color:T.ink}}>{p.name}</div>
            <div style={{fontFamily:T.kr,fontSize:15,color:T.s,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:2}}>{p.crops?.map(c=>c.name).join(', ')||'미경작'} · {p.area}</div>
          </div>{I.chR(12,T.t)}
        </div>)}
      </div>}
      {r.diary.length>0&&<div style={{marginTop:14}}>
        <div style={{fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.t,letterSpacing:.8,marginBottom:8,textTransform:'uppercase'}}>작업 일지 ({r.diary.length})</div>
        {r.diary.map(d=>{const pl=data.plots.find(p=>p.id===d.plotId);return<div key={d.id} onClick={()=>{nav.push('log-detail',{log:d});onClose();}} style={{display:'flex',alignItems:'center',gap:10,background:T.card,borderRadius:12,padding:'10px 12px',marginBottom:6,cursor:'pointer',border:`0.5px solid ${T.bd}`}}>
          <div style={{width:36,height:36,borderRadius:10,background:T.J+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{I.cal(17,T.J)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
              <span style={{fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.J,background:T.Js,padding:'1px 6px',borderRadius:999}}>{d.workType}</span>
              <span style={{fontFamily:T.kr,fontSize:15,color:T.t}}>{pl?.name||'전체'}</span>
            </div>
            <div style={{fontFamily:T.kr,fontSize:16,color:T.s,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.detail?.slice(0,40)||'내용 없음'}</div>
          </div>
          <div style={{fontFamily:T.en,fontSize:14,color:T.t,flexShrink:0}}>{d.date?.slice(5)}</div>
        </div>;})}
      </div>}
      {r.ledger.length>0&&<div style={{marginTop:14}}>
        <div style={{fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.t,letterSpacing:.8,marginBottom:8,textTransform:'uppercase'}}>거래 ({r.ledger.length})</div>
        {r.ledger.map(l=><div key={l.id} onClick={()=>{nav.push('txn-detail',{txn:l});onClose();}} style={{display:'flex',alignItems:'center',gap:10,background:T.card,borderRadius:12,padding:'10px 12px',marginBottom:6,cursor:'pointer',border:`0.5px solid ${T.bd}`}}>
          <div style={{width:36,height:36,borderRadius:10,background:l.type==='income'?'#E8F5E9':'#FFEBEE',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{l.type==='income'?I.aD(13,'#1C551C'):I.aU(13,T.red)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:T.kr,fontSize:16,fontWeight:700,color:T.ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</div>
            <div style={{fontFamily:T.kr,fontSize:15,color:T.s,marginTop:2}}>{l.date} · {l.cat}</div>
          </div>
          <div style={{fontFamily:T.en,fontSize:15,fontWeight:700,color:l.type==='income'?'#1C551C':T.red,flexShrink:0}}>{l.type==='income'?'+':'-'}₩{fmt(l.amount)}</div>
        </div>)}
      </div>}
    </div>
  </div>;
}

function NotifPanel({notifications,onRead,onReadAll,onClose}){
  const unread=notifications.filter(n=>!n.read).length;
  const typeBg={tip:T.Js,weather:'#E8EFF8',reminder:T.Ls,diary:T.Js,ledger:T.Ls};
  return<div style={{position:'absolute',inset:0,zIndex:500,display:'flex',flexDirection:'column',background:T.bg}}>
    <div style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',background:T.bg,borderBottom:`0.5px solid ${T.bd}`}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontFamily:T.kr,fontSize:17,fontWeight:700,color:T.ink}}>알림</span>
        {unread>0&&<span style={{background:T.red,color:'#fff',borderRadius:999,padding:'1px 7px',fontFamily:T.en,fontSize:15,fontWeight:700}}>{unread}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {unread>0&&<button onClick={onReadAll} style={{border:'none',background:'none',fontFamily:T.kr,fontSize:16,fontWeight:600,color:T.J,cursor:'pointer',padding:'4px 6px'}}>모두 읽음</button>}
        <button onClick={onClose} style={BI}>{I.chL(16,T.ink)}</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'8px 14px 20px'}}>
      {notifications.length===0&&<div style={{padding:'48px 0',textAlign:'center'}}><div style={{fontSize:36,marginBottom:12}}>🔔</div><div style={{fontFamily:T.kr,fontSize:15,color:T.s}}>알림이 없습니다</div></div>}
      {notifications.map(n=><div key={n.id} onClick={()=>onRead(n.id)} style={{display:'flex',gap:12,padding:'12px 14px',borderRadius:14,marginBottom:8,background:n.read?T.card:'rgba(58,125,76,0.06)',border:`0.5px solid ${n.read?T.bd:T.J+'40'}`,cursor:'pointer',position:'relative'}}>
        {!n.read&&<div style={{position:'absolute',top:14,right:14,width:7,height:7,borderRadius:999,background:T.red}}/>}
        <div style={{width:42,height:42,borderRadius:12,background:typeBg[n.type]||T.Js,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{n.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontFamily:T.kr,fontSize:15,fontWeight:700,color:T.ink}}>{n.title}</span>
            <span style={{fontFamily:T.en,fontSize:14,color:T.t,flexShrink:0,marginLeft:8}}>{n.time}</span>
          </div>
          <div style={{fontFamily:T.kr,fontSize:16,color:T.s,lineHeight:1.5}}>{n.body}</div>
        </div>
      </div>)}
    </div>
  </div>;
}

function App(){
  const [mode,setMode]=useState('journal');
  const [splashDone,setSplashDone]=useState(false);const [tab,setTab]=useState('home');const [stack,setStack]=useState([]);const [toast,setToast]=useState(null);
  const [data,setData]=useState({plots:[],diary:[],ledger:[]});
  const [showSearch,setShowSearch]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [notifications,setNotifications]=useState([
    {id:1,type:'tip',icon:'🌱',title:'오늘의 농업 팁',body:'기온이 낮은 아침에 관수하면 증발량을 줄일 수 있어요.',time:'방금 전',read:false},
    {id:2,type:'weather',icon:'🌤️',title:'오늘 날씨',body:'맑음 · 최저 9° 최고 22° · 강수확률 10%',time:'오전 6:00',read:false},
    {id:3,type:'reminder',icon:'📋',title:'필지 등록 안내',body:'필지를 먼저 등록하면 작업 기록이 더 편리해집니다.',time:'어제',read:true},
  ]);
  const [userName,setUserName]=useState('');
  const showToast=useCallback((msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2200);},[]);
  const nav={push:(s,p={})=>setStack(st=>[...st,{screen:s,params:p}]),pop:()=>setStack(s=>s.slice(0,-1))};
  const goTab=t=>{setTab(t);setStack([]);};const goMode=m=>{setMode(m);setTab('home');setStack([]);};const goHome=()=>{setStack([]);setTab('home');};
  const addDiary=e=>{
    setData(d=>({...d,diary:[e,...d.diary]}));
    setNotifications(n=>[{id:Date.now(),type:'diary',icon:'📝',title:'작업 일지 저장됨',body:`${e.workType} · ${e.date}`,time:'방금 전',read:false},...n]);
    showToast('작업 일지가 저장되었습니다');goHome();
  };
  const addTxn=t=>{
    setData(d=>({...d,ledger:[t,...d.ledger]}));
    setNotifications(n=>[{id:Date.now(),type:'ledger',icon:t.type==='income'?'💵':'💸',title:t.type==='income'?'수입 등록됨':'지출 등록됨',body:`${t.name} · ${(t.amount||0).toLocaleString('ko-KR')}원`,time:'방금 전',read:false},...n]);
    showToast('거래가 저장되었습니다');goHome();
  };
  const addPlot=p=>{setData(d=>({...d,plots:[...d.plots,{...p,crops:p.crops||[]}]}));showToast('필지가 추가되었습니다');goHome();};
  const addCropToPlot=(pid,crop)=>{setData(d=>({...d,plots:d.plots.map(p=>p.id===pid?{...p,crops:[...(p.crops||[]),{id:'c'+mkId(),...crop}]}:p)}));showToast('작물이 추가되었습니다');};
  const deletePlot=pid=>{setData(d=>({...d,plots:d.plots.filter(p=>p.id!==pid)}));showToast('필지가 삭제되었습니다');nav.pop();};
  const handleReset=()=>{setData({plots:[],diary:[],ledger:[]});setUserName('');goHome();showToast('초기화되었습니다');};
  const accent=mode==='journal'?T.J:T.L;
  const jTabs=[{k:'home',label:'홈',fn:I.home},{k:'cal',label:'일지',fn:I.cal},{k:'add',label:'',fn:null,add:true},{k:'map',label:'필지',fn:I.map},{k:'me',label:'내정보',fn:I.user}];
  const lTabs=[{k:'home',label:'결산',fn:I.home},{k:'recp',label:'거래',fn:I.recpt},{k:'add',label:'',fn:null,add:true},{k:'pnl',label:'손익',fn:I.chart},{k:'sub',label:'보조금',fn:I.wallet}];
  const tabs=mode==='journal'?jTabs:lTabs;
  const cur=stack.length>0?stack[stack.length-1]:null;
  const props={nav,mode,onMode:goMode,data,toast2:showToast,goHome,deletePlot,addCropToPlot,userName,onSearch:()=>setShowSearch(true),onBell:()=>setShowNotif(true),notifCount:notifications.filter(n=>!n.read).length};
  const renderPushed=()=>{if(!cur)return null;const{screen:s,params:p}=cur;switch(s){case 'log-detail':return<LogDetail {...props} params={p}/>;case 'plot-detail':return<PlotDetail {...props} params={p}/>;case 'all-logs':return<AllLogs {...props}/>;case 'all-plots':return<AllPlots {...props}/>;case 'add-work':return<JAddWork {...props} onSave={addDiary} initParams={p}/>;case 'add-plot':return<AddPlot {...props} onSave={addPlot}/>;case 'add-txn':return<LAddTxn {...props} onSave={addTxn}/>;case 'add-subsidy':return<LAddTxn {...props} onSave={addTxn}/>;case 'all-txns':return<AllTxns {...props}/>;case 'txn-detail':return<TxnDetail {...props} params={p}/>;default:return null;}};
  const renderTab=()=>{if(mode==='journal'){if(tab==='home')return<JHome {...props}/>;if(tab==='cal')return<JCal {...props}/>;if(tab==='map')return<JMap {...props}/>;if(tab==='add')return<JAddWork {...props} onSave={addDiary} initParams={{}}/>;if(tab==='me')return<MeScreen data={data} mode={mode} onMode={goMode} onNameChange={setUserName} onReset={handleReset}/>;}else{if(tab==='home')return<LHome {...props}/>;if(tab==='recp')return<AllTxns {...props}/>;if(tab==='add')return<LAddTxn {...props} onSave={addTxn}/>;if(tab==='pnl')return<PnlScreen data={data} mode={mode} onMode={goMode}/>;if(tab==='sub')return<SubsidyScreen data={data} mode={mode} onMode={goMode}/>;}return null;};
  const isMobile = window.innerWidth <= 600 || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // ── single wrapper – position:fixed fills exactly the screen ──────
  const screen = (
    <div style={{
      position:'fixed', top:0, left:0, right:0, bottom:0,
      display:'flex', flexDirection:'column',
      background:T.bg,
      fontFamily:T.kr,
      // safe-area padding so content never hides under notch / home bar
      paddingTop:  isMobile ? 'env(safe-area-inset-top,   0px)' : 0,
      paddingBottom: 0,  // TabBar handles its own bottom padding
    }}>
      <style>{`
        @keyframes spin  {to{transform:rotate(360deg)}}
        @keyframes pulse {0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes wave  {from{transform:scaleY(.3)}to{transform:scaleY(1.1)}}
      `}</style>

      {/* Main content area */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative'}}>
        {cur
          ? <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderPushed()}</div>
          : <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderTab()}</div>
        }
        {/* Overlays (absolute inside relative parent) */}
        {toast      && <Toast msg={toast.msg} color={toast.ok?T.J:T.red}/>}
        {showSearch && <SearchPanel data={data} onClose={()=>setShowSearch(false)} nav={nav} mode={mode} onMode={goMode}/>}
        {showNotif  && <NotifPanel  notifications={notifications}
                         onRead={id=>setNotifications(n=>n.map(x=>x.id===id?{...x,read:true}:x))}
                         onReadAll={()=>setNotifications(n=>n.map(x=>({...x,read:true})))}
                         onClose={()=>setShowNotif(false)}/>}
      </div>

      {/* TabBar sits OUTSIDE the scrollable area, at the very bottom */}
      {!cur && <TabBar tabs={tabs} active={tab}
                 onTab={t=>{if(t==='add')nav.push(mode==='journal'?'add-work':'add-txn',{});else goTab(t);}}
                 accent={accent}/>}

      {!splashDone && <SplashScreen onDone={()=>setSplashDone(true)}/>}
    </div>
  );

  if(isMobile) return screen;

  // Desktop: phone mockup wrapper
  return (
    <div style={{
      position:'fixed', top:0, left:0, right:0, bottom:0,
      display:'flex', alignItems:'center', justifyContent:'center',
      background:'#EFEEEA',
    }}>
      {!splashDone && <SplashScreen onDone={()=>setSplashDone(true)}/>}
      <div style={{
        width:390, height:Math.min(window.innerHeight-32, 844),
        borderRadius:40, overflow:'hidden', position:'relative',
        background:T.bg,
        boxShadow:'0 20px 60px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.10)',
        display:'flex', flexDirection:'column',
      }}>
        {/* Phone top bar */}
        <div style={{flexShrink:0,background:'#F2F2F7',position:'relative',zIndex:20}}>
          <div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',width:120,height:33,borderRadius:20,background:'#000',zIndex:30}}/>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 24px 6px'}}>
            <span style={{fontFamily:'-apple-system,system-ui',fontWeight:600,fontSize:14,color:'#000'}}>9:41</span>
            <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#000" strokeOpacity=".3" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#000"/></svg>
          </div>
        </div>
        {/* App content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:T.bg,position:'relative'}}>
          <style>{`
            @keyframes spin  {to{transform:rotate(360deg)}}
            @keyframes pulse {0%,100%{opacity:1}50%{opacity:.3}}
            @keyframes wave  {from{transform:scaleY(.3)}to{transform:scaleY(1.1)}}
          `}</style>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
            {cur
              ? <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderPushed()}</div>
              : <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{renderTab()}</div>
            }
            {toast      && <Toast msg={toast.msg} color={toast.ok?T.J:T.red}/>}
            {showSearch && <SearchPanel data={data} onClose={()=>setShowSearch(false)} nav={nav} mode={mode} onMode={goMode}/>}
            {showNotif  && <NotifPanel  notifications={notifications}
                             onRead={id=>setNotifications(n=>n.map(x=>x.id===id?{...x,read:true}:x))}
                             onReadAll={()=>setNotifications(n=>n.map(x=>({...x,read:true})))}
                             onClose={()=>setShowNotif(false)}/>}
          </div>
          {!cur && <TabBar tabs={tabs} active={tab}
                     onTab={t=>{if(t==='add')nav.push(mode==='journal'?'add-work':'add-txn',{});else goTab(t);}}
                     accent={accent}/>}
        </div>
        {/* Phone bottom bar */}
        <div style={{flexShrink:0,height:20,background:'#fff',display:'flex',justifyContent:'center',alignItems:'center'}}>
          <div style={{width:120,height:4,borderRadius:100,background:'rgba(0,0,0,.18)'}}/>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
